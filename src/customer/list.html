<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customers - List</title>
</head>
<body>

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <a href="#/master-data">Master Data</a> &rsaquo; Customers
  </div>

  <!-- Page Header -->
  <div class="page-header">
    <h1>Customers</h1>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn btn-primary" onclick="window.location.hash='#/master-data/customers/new'">New</button>
    <button class="btn" id="btn-export">Export</button>
    <button class="btn" id="btn-print">Print</button>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="filter-group">
      <label for="customer-search">Search:</label>
      <input type="text" id="customer-search" placeholder="Search by code, name, or TIN">
    </div>
  </div>

  <!-- Data Grid -->
  <div class="data-grid-container">
    <table class="data-grid">
      <thead>
        <tr>
          <th>Code</th>
          <th>Registered Name</th>
          <th>Trade Name</th>
          <th>Entity Type</th>
          <th>Tax Type</th>
          <th>TIN</th>
          <th>Active</th>
          <th>Credit Hold</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="customer-grid-body">
        <!-- Data will be populated here -->
        <tr>
          <td colspan="9" class="text-center text-muted">Loading...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div class="pagination">
    <span class="pagination-info" id="customer-pagination-info">Showing 0 to 0 of 0 entries</span>
    <div class="pagination-controls">
      <button class="btn btn-sm" id="btn-prev-page" disabled>Prev</button>
      <button class="btn btn-sm" id="btn-next-page" disabled>Next</button>
    </div>
  </div>

  <!-- Application Logic -->
  <script type="module" src="customer-list.js"></script>
</body>
</html>
