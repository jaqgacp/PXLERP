<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Company</title>
</head>
<body>

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <a href="#/setup">Setup</a> &rsaquo; 
    <a href="#/setup/company-setup">Company Setup</a> &rsaquo; Edit Company
  </div>

  <!-- Page Header -->
  <div class="page-header">
    <h1>Edit Company</h1>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn btn-primary" id="btn-save">Save</button>
    <button class="btn" onclick="window.location.hash = '#/setup/company-setup'">Cancel</button>
  </div>

  <!-- Session Indicator -->
  <div id="auth-status" style="padding: 10px; margin-top: 10px; background: #fff3cd; border: 1px solid #ffeeba; border-radius: 4px; font-size: 14px;">
    Checking auth state...
  </div>

  <!-- Form Sections -->
  <div class="erp-form-container">
    <form id="company-edit-form" onsubmit="return false;">
      
      <div id="form-error" class="erp-validation-summary"></div>

      <!-- SECTION 1: General Information -->
      <fieldset class="erp-section">
        <legend>General Information</legend>
        <div class="erp-grid">
          <div class="erp-field">
            <label class="erp-required">Code</label>
            <input type="text" id="code" required>
          </div>
          <div class="erp-field">
            <label class="erp-required">Registered Name</label>
            <input type="text" id="name" required>
          </div>
          <div class="erp-field">
            <label>Trade Name</label>
            <input type="text" id="trade_name">
          </div>
          <div class="erp-field">
            <label class="erp-required">Base TIN (9 Digits)</label>
            <input type="text" id="base_tin" required placeholder="e.g. 123-456-789" maxlength="15">
          </div>
          <div class="erp-field">
            <label class="erp-required">Branch Code</label>
            <input type="text" id="branch_code" required value="00000" maxlength="5" pattern="\d{5}" title="Must be exactly 5 digits">
          </div>
          <div class="erp-field">
            <label>Full TIN</label>
            <input type="text" id="full_tin" readonly placeholder="Generated automatically">
          </div>
        </div>
      </fieldset>

      <!-- SECTION 2: Tax & Business Registration -->
      <fieldset class="erp-section">
        <legend>Tax & Business Registration</legend>
        <div class="erp-grid">
          <div class="erp-field">
            <label class="erp-required">Tax Type</label>
            <select id="tax_type" required>
              <option value="">Select...</option>
              <option value="vat">VAT</option>
              <option value="non_vat">Non-VAT</option>
            </select>
          </div>
          <div class="erp-field">
            <label class="erp-required">Business Type</label>
            <select id="business_type" required>
              <option value="">Select...</option>
              <option value="corporation">Corporation</option>
              <option value="partnership">Partnership</option>
              <option value="sole_proprietorship">Sole Proprietorship</option>
              <option value="cooperative">Cooperative</option>
            </select>
          </div>
          <div class="erp-field">
            <label>RDO Code</label>
            <input type="text" id="rdo_code">
          </div>
          <div class="erp-field">
            <label>BIR Registration Date</label>
            <input type="date" id="bir_registration_date">
          </div>
          <div class="erp-field">
            <label>SEC Registration No.</label>
            <input type="text" id="sec_registration_no">
          </div>
          <div class="erp-field">
            <label>DTI Registration No.</label>
            <input type="text" id="dti_registration_no">
          </div>
          <div class="erp-field">
            <label>CDA Registration No.</label>
            <input type="text" id="cda_registration_no">
          </div>
          <div class="erp-field">
            <label>Incorporation/Registration Date</label>
            <input type="date" id="registration_date">
          </div>
          <div class="erp-field">
            <label class="erp-required">Line of Business (Per COR)</label>
            <input type="text" id="line_of_business" required>
          </div>
          <div class="erp-field">
            <label>PSIC Code</label>
            <input type="text" id="psic_code">
          </div>
          <div class="erp-field">
            <label>Industry Classification</label>
            <input type="text" id="industry_classification">
          </div>
        </div>
      </fieldset>

      <!-- SECTION 3: Address & Contact -->
      <fieldset class="erp-section">
        <legend>Address & Contact</legend>
        <div class="erp-grid">
          <div class="erp-field" style="grid-column: span 2;">
            <label class="erp-required">BIR Registered Address</label>
            <textarea id="bir_registered_address" required rows="2"></textarea>
          </div>
          <div class="erp-field">
            <label class="erp-required">Zip Code</label>
            <input type="text" id="zip_code" required>
          </div>
          <div class="erp-field">
            <label>Contact Person</label>
            <input type="text" id="contact_person">
          </div>
          <div class="erp-field">
            <label class="erp-required">Phone</label>
            <input type="text" id="phone" required>
          </div>
          <div class="erp-field">
            <label>Mobile No</label>
            <input type="text" id="mobile_no">
          </div>
          <div class="erp-field">
            <label class="erp-required">Email</label>
            <input type="email" id="email" required>
          </div>
          <div class="erp-field">
            <label>Website</label>
            <input type="text" id="website">
          </div>
        </div>
      </fieldset>

      <!-- SECTION 4: Compliance Profile & Signatory -->
      <fieldset class="erp-section">
        <legend>Compliance Profile & Authorized Signatory</legend>
        <div class="erp-grid">
          <div class="erp-field">
            <label style="font-weight:600; margin-bottom:10px;">Compliance Flags</label>
            <label style="display:flex; align-items:center; gap:8px; font-weight:normal;">
              <input type="checkbox" id="is_withholding_agent"> Is Withholding Agent (Top 20k/5k)
            </label>
            <label style="display:flex; align-items:center; gap:8px; font-weight:normal; margin-top:5px;">
              <input type="checkbox" id="is_large_taxpayer"> Is Large Taxpayer
            </label>
            <label style="display:flex; align-items:center; gap:8px; font-weight:normal; margin-top:5px;">
              <input type="checkbox" id="is_peza_registered"> PEZA Registered
            </label>
            <label style="display:flex; align-items:center; gap:8px; font-weight:normal; margin-top:5px;">
              <input type="checkbox" id="is_boi_registered"> BOI Registered
            </label>
            <label style="display:flex; align-items:center; gap:8px; font-weight:normal; margin-top:5px;">
              <input type="checkbox" id="is_bmbes_registered"> BMBE Registered
            </label>
          </div>
          <div>
            <div class="erp-field" style="margin-bottom: 15px;">
              <label class="erp-required">Signatory Name</label>
              <input type="text" id="signatory_name" required>
            </div>
            <div class="erp-field" style="margin-bottom: 15px;">
              <label class="erp-required">Signatory Title</label>
              <input type="text" id="signatory_title" required>
            </div>
            <div class="erp-field">
              <label class="erp-required">Signatory TIN</label>
              <input type="text" id="signatory_tin" required>
            </div>
          </div>
        </div>
      </fieldset>

      <!-- SECTION 5: Accounting & System Defaults -->
      <fieldset class="erp-section">
        <legend>Accounting & System Defaults</legend>
        <div class="erp-grid">
          <div class="erp-field">
            <label>CAS PTU Number</label>
            <input type="text" id="ptu_cas_no">
          </div>
          <div class="erp-field">
            <label>CAS PTU Date Issued</label>
            <input type="date" id="ptu_cas_date_issued">
          </div>
          <div class="erp-field">
            <label class="erp-required">Accounting Method</label>
            <select id="accounting_method" required>
              <option value="Accrual">Accrual</option>
              <option value="Cash">Cash</option>
            </select>
          </div>
          <div class="erp-field">
            <label class="erp-required">Inventory Costing Method</label>
            <select id="inventory_costing_method" required>
              <option value="Weighted Average">Weighted Average</option>
              <option value="FIFO">FIFO</option>
            </select>
          </div>
          <div class="erp-field">
            <label class="erp-required">Functional Currency</label>
            <select id="functional_currency_id" required>
              <option value="">Loading currencies...</option>
            </select>
          </div>
          <div class="erp-field">
            <label class="erp-required">Fiscal Year Start Month</label>
            <select id="fiscal_year_start_month" required>
              <option value="1">1 - January</option>
              <option value="2">2 - February</option>
              <option value="3">3 - March</option>
              <option value="4">4 - April</option>
              <option value="5">5 - May</option>
              <option value="6">6 - June</option>
              <option value="7">7 - July</option>
              <option value="8">8 - August</option>
              <option value="9">9 - September</option>
              <option value="10">10 - October</option>
              <option value="11">11 - November</option>
              <option value="12">12 - December</option>
            </select>
          </div>
          <div class="erp-field">
            <label style="display:flex; align-items:center; gap:8px; font-weight:normal; margin-top:20px;">
              <input type="checkbox" id="is_active"> Is Active
            </label>
          </div>
        </div>
      </fieldset>

    </form>
  </div>

  <!-- Status Footer -->
  <div class="status-footer">
    <span class="status-text" id="page-status">Loading data...</span>
  </div>

  <script type="module" src="company-edit.js"></script>
</body>
</html>
