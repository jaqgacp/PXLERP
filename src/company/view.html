<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>View Company</title>
</head>
<body>

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <a href="#/setup">Setup</a> &rsaquo; 
    <a href="#/setup/company-setup">Company Setup</a> &rsaquo; View Company
  </div>

  <!-- Page Header -->
  <div class="page-header">
    <h1>View Company</h1>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn btn-primary" id="btn-edit">Edit</button>
    <button class="btn" onclick="window.location.hash = '#/setup/company-setup'">Back</button>
  </div>

  <!-- Form Sections -->
  <div class="erp-form-container">
    <form id="company-view-form" onsubmit="return false;">
      
      <!-- SECTION 1: General Information -->
      <fieldset class="erp-section">
        <legend>General Information</legend>
        <div class="erp-grid">
          <div class="erp-field">
            <label>Code</label>
            <input type="text" id="code" readonly disabled>
          </div>
          <div class="erp-field">
            <label>Registered Name</label>
            <input type="text" id="name" readonly disabled>
          </div>
          <div class="erp-field">
            <label>Trade Name</label>
            <input type="text" id="trade_name" readonly disabled>
          </div>
          <div class="erp-field">
            <label>Base TIN</label>
            <input type="text" id="base_tin" readonly disabled>
          </div>
          <div class="erp-field">
            <label>Branch Code</label>
            <input type="text" id="branch_code" readonly disabled>
          </div>
          <div class="erp-field">
            <label>Full TIN</label>
            <input type="text" id="full_tin" readonly disabled>
          </div>
        </div>
      </fieldset>

      <!-- SECTION 2: Tax & Business Registration -->
      <fieldset class="erp-section">
        <legend>Registration & Tax Details</legend>
        <div class="erp-grid">
          <div class="erp-field">
            <label>Tax Type</label>
            <select id="tax_type" readonly disabled>
              <option value="vat">VAT</option>
              <option value="non_vat">Non-VAT</option>
            </select>
          </div>
          <div class="erp-field">
            <label>Business Type</label>
            <select id="business_type" readonly disabled>
              <option value="corporation">Corporation</option>
              <option value="partnership">Partnership</option>
              <option value="sole_proprietorship">Sole Proprietorship</option>
              <option value="cooperative">Cooperative</option>
            </select>
          </div>
          <div class="erp-field">
            <label>RDO Code</label>
            <input type="text" id="rdo_code" readonly disabled>
          </div>
          <div class="erp-field">
            <label>BIR Registration Date</label>
            <input type="date" id="bir_registration_date" readonly disabled>
          </div>
          <div class="erp-field">
            <label>SEC Registration No.</label>
            <input type="text" id="sec_registration_no" readonly disabled>
          </div>
          <div class="erp-field">
            <label>DTI Registration No.</label>
            <input type="text" id="dti_registration_no" readonly disabled>
          </div>
          <div class="erp-field">
            <label>CDA Registration No.</label>
            <input type="text" id="cda_registration_no" readonly disabled>
          </div>
          <div class="erp-field">
            <label>Registration Date</label>
            <input type="date" id="registration_date" readonly disabled>
          </div>
          <div class="erp-field">
            <label>Line of Business (Per COR)</label>
            <input type="text" id="line_of_business" readonly disabled>
          </div>
          <div class="erp-field">
            <label>Industry Classification</label>
            <input type="text" id="industry_classification" readonly disabled>
          </div>
          <div class="erp-field">
            <label>PSIC Code</label>
            <input type="text" id="psic_code" readonly disabled>
          </div>
        </div>
      </fieldset>

      <!-- SECTION 3: Address & Contact -->
      <fieldset class="erp-section">
        <legend>Address & Contact</legend>
        <div class="erp-grid">
          <div class="erp-field erp-field-wide">
            <label>BIR Registered Address</label>
            <textarea id="bir_registered_address" readonly disabled rows="2"></textarea>
          </div>
          <div class="erp-field">
            <label>Zip Code</label>
            <input type="text" id="zip_code" readonly disabled>
          </div>
          <div class="erp-field">
            <label>Contact Person</label>
            <input type="text" id="contact_person" readonly disabled>
          </div>
          <div class="erp-field">
            <label>Phone</label>
            <input type="text" id="phone" readonly disabled>
          </div>
          <div class="erp-field">
            <label>Mobile No.</label>
            <input type="text" id="mobile_no" readonly disabled>
          </div>
          <div class="erp-field">
            <label>Email</label>
            <input type="email" id="email" readonly disabled>
          </div>
          <div class="erp-field">
            <label>Website</label>
            <input type="text" id="website" readonly disabled>
          </div>
        </div>
      </fieldset>

      <!-- SECTION 4: Compliance Profile -->
      <fieldset class="erp-section">
        <legend>Compliance Profile</legend>
        <div class="erp-grid">
          <div class="erp-field erp-field-wide">
            <div class="erp-checkbox-group">
              <label class="erp-checkbox-item">
                <input type="checkbox" id="is_withholding_agent" readonly disabled> Withholding Agent (Top 20k/5k)
              </label>
              <label class="erp-checkbox-item">
                <input type="checkbox" id="is_large_taxpayer" readonly disabled> Large Taxpayer
              </label>
              <label class="erp-checkbox-item">
                <input type="checkbox" id="is_peza_registered" readonly disabled> PEZA Registered
              </label>
              <label class="erp-checkbox-item">
                <input type="checkbox" id="is_boi_registered" readonly disabled> BOI Registered
              </label>
              <label class="erp-checkbox-item">
                <input type="checkbox" id="is_bmbes_registered" readonly disabled> BMBE Registered
              </label>
            </div>
          </div>
        </div>
      </fieldset>

      <!-- SECTION 5: Authorized Signatory -->
      <fieldset class="erp-section">
        <legend>Authorized Signatory</legend>
        <div class="erp-grid">
          <div class="erp-field">
            <label>Signatory Name</label>
            <input type="text" id="signatory_name" readonly disabled>
          </div>
          <div class="erp-field">
            <label>Signatory TIN</label>
            <input type="text" id="signatory_tin" readonly disabled>
          </div>
          <div class="erp-field">
            <label>Signatory Title</label>
            <input type="text" id="signatory_title" readonly disabled>
          </div>
        </div>
      </fieldset>

      <!-- SECTION 6: Accounting & CAS Defaults -->
      <fieldset class="erp-section">
        <legend>Accounting & Future CAS</legend>
        <div class="erp-grid">
          <div class="erp-field">
            <label>Functional Currency</label>
            <input type="text" id="functional_currency_id" readonly disabled>
          </div>
          <div class="erp-field">
            <label>Fiscal Year Start Month</label>
            <select id="fiscal_year_start_month" readonly disabled>
              <option value="1">1 - January</option>
              <option value="2">2 - February</option>
              <option value="3">3 - March</option>
              <option value="4">4 - April</option>
              <option value="5">5 - May</option>
              <option value="6">6 - June</option>
              <option value="7">7 - July</option>
              <option value="8">8 - August</option>
              <option value="9">9 - September</option>
              <option value="10">10 - October</option>
              <option value="11">11 - November</option>
              <option value="12">12 - December</option>
            </select>
          </div>
          <div class="erp-field">
            <label>Accounting Method</label>
            <select id="accounting_method" readonly disabled>
              <option value="Accrual">Accrual</option>
              <option value="Cash">Cash</option>
            </select>
          </div>
          <div class="erp-field">
            <label>Inventory Costing Method</label>
            <select id="inventory_costing_method" readonly disabled>
              <option value="Weighted Average">Weighted Average</option>
              <option value="FIFO">FIFO</option>
            </select>
          </div>
          <div class="erp-field">
            <label>PTU/CAS No.</label>
            <input type="text" id="ptu_cas_no" readonly disabled>
          </div>
          <div class="erp-field">
            <label>PTU/CAS Date Issued</label>
            <input type="date" id="ptu_cas_date_issued" readonly disabled>
          </div>
          <div class="erp-field erp-field-wide">
            <div class="erp-checkbox-group erp-checkbox-group-spaced">
              <label class="erp-checkbox-item">
                <input type="checkbox" id="is_active" readonly disabled> Is Active
              </label>
            </div>
          </div>
        </div>
      </fieldset>

    </form>
  </div>

  <!-- Status Footer -->
  <div class="status-footer">
    <span class="status-text" id="page-status">Loading data...</span>
  </div>

  <script type="module" src="company-view.js"></script>
</body>
</html>
