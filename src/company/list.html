<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Company Setup - List</title>
</head>
<body>

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <a href="#/setup">Setup</a> &rsaquo; Company Setup
  </div>

  <!-- Page Header -->
  <div class="page-header">
    <h1>Company Setup</h1>
  </div>

  <!-- ERP List Container -->
  <div class="erp-list-container">
    
    <!-- ERP List Toolbar -->
    <div class="erp-list-toolbar">
      <div class="erp-list-search">
        <input type="text" id="company-search" placeholder="Search by code, name, or TIN">
      </div>
      <div class="erp-list-toolbar-actions">
        <button class="btn-secondary" onclick="alert('Not implemented yet')">Print</button>
        <button class="btn-secondary" onclick="alert('Not implemented yet')">Export</button>
        <button class="btn-primary" onclick="window.location.hash = '#/setup/company-setup/new'">+ New Company</button>
      </div>
    </div>

    <!-- ERP List Table -->
    <div class="erp-list-table-wrapper">
      <table class="erp-list-table">
        <thead>
          <tr>
            <th>Code</th>
            <th>Name</th>
            <th>Trade Name</th>
            <th>TIN</th>
            <th>Tax Type</th>
            <th>Business Type</th>
            <th>RDO Code</th>
            <th>Active</th>
            <th>Created At</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="company-grid-body">
          <tr>
            <td colspan="10" class="erp-list-state-cell">
              <span class="erp-list-state-icon">⏳</span>
              <div>Loading companies...</div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- ERP List Pagination -->
    <div class="erp-list-pagination">
      <span class="page-info" id="pg-info">0 records</span>
      <div class="erp-list-pagination-controls">
        <button disabled>Previous</button>
        <button disabled>Next</button>
      </div>
    </div>

  </div>

  <script type="module" src="company-list.js"></script>
</body>
</html>
