<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New Fiscal Year</title>
</head>
<body>

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <a href="#/setup">Setup</a> &rsaquo; 
    <a href="#/setup/fiscal-years">Fiscal Years</a> &rsaquo; New Fiscal Year
  </div>

  <!-- Page Header -->
  <div class="page-header">
    <h1>New Fiscal Year</h1>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn btn-primary" id="btn-save">Save</button>
    <button class="btn" id="btn-save-new">Save & New</button>
    <button class="btn" onclick="window.location.hash = '#/setup/fiscal-years'">Cancel</button>
  </div>

  <!-- Session Indicator -->
  <div id="auth-status" style="padding: 10px; margin-top: 10px; background: #fff3cd; border: 1px solid #ffeeba; border-radius: 4px; font-size: 14px;">
    Checking auth state...
  </div>

  <!-- Form Sections -->
  <div class="form-container" style="padding: 20px; background: #fff; border: 1px solid #d4e4f0; margin-top: 10px;">
    <form id="fy-create-form" onsubmit="return false;">
      
      <div id="form-error" style="color: red; margin-bottom: 15px; display: none;"></div>

      <fieldset style="border: 1px solid #ccc; padding: 15px; margin-bottom: 15px;">
        <legend>General Information</legend>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
          <div>
            <label>Year Code <span style="color:red">*</span></label><br>
            <input type="text" id="year_code" required style="width: 100%; padding: 5px;" placeholder="e.g. 2026">
          </div>
          <div>
            <label>Current Fiscal Year?</label><br>
            <label style="display:flex; align-items:center; gap:5px; margin-top:5px;">
              <input type="checkbox" id="is_current"> Yes, set as the current fiscal year
            </label>
          </div>
          <div>
            <label>Date From <span style="color:red">*</span></label><br>
            <input type="date" id="date_from" required style="width: 100%; padding: 5px;">
          </div>
          <div>
            <label>Date To <span style="color:red">*</span></label><br>
            <input type="date" id="date_to" required style="width: 100%; padding: 5px;">
          </div>
        </div>
      </fieldset>
    </form>
  </div>

  <script type="module" src="fiscal-years-create.js"></script>
</body>
</html>
