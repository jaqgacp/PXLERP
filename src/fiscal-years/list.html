<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fiscal Years - List</title>
</head>
<body>

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <a href="#/setup">Setup</a> &rsaquo; Fiscal Years
  </div>

  <!-- Page Header -->
  <div class="page-header">
    <h1>Fiscal Years</h1>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn btn-primary" onclick="window.location.hash = '#/setup/fiscal-years/new'">New</button>
  </div>

  <!-- Data Grid -->
  <div class="data-grid-container">
    <table class="data-grid">
      <thead>
        <tr>
          <th>Year Code</th>
          <th>From Date</th>
          <th>To Date</th>
          <th>Current</th>
          <th>Status</th>
          <th>Created At</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="fiscal-years-grid-body">
        <!-- Data will be populated here -->
        <tr>
          <td colspan="7" class="text-center text-muted">Loading...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Status Footer -->
  <div class="status-footer">
    <span class="status-text">Fiscal Years List Loaded</span>
  </div>

  <script type="module" src="fiscal-years-list.js"></script>
</body>
</html>
