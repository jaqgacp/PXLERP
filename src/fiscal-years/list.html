<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fiscal Years - List</title>
</head>
<body>

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <a href="#/setup">Setup</a> &rsaquo; Fiscal Years
  </div>

  <!-- Page Header -->
  <div class="page-header">
    <h1>Fiscal Years</h1>
  </div>

  <!-- ERP List Container -->
  <div class="erp-list-container">
    
    <!-- ERP List Toolbar -->
    <div class="erp-list-toolbar">
      <div class="erp-list-search">
        <!-- Optional search for later -->
      </div>
      <div class="erp-list-toolbar-actions">
        <button class="btn-primary" onclick="window.location.hash = '#/setup/fiscal-years/new'">+ New Fiscal Year</button>
      </div>
    </div>

    <!-- ERP List Table -->
    <div class="erp-list-table-wrapper">
      <table class="erp-list-table">
        <thead>
          <tr>
            <th>Year Code</th>
            <th>From Date</th>
            <th>To Date</th>
            <th>Current</th>
            <th>Status</th>
            <th>Created At</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="fiscal-years-grid-body">
          <tr>
            <td colspan="7" class="erp-list-state-cell">
              <span class="erp-list-state-icon">⏳</span>
              <div>Loading fiscal years...</div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- ERP List Pagination -->
    <div class="erp-list-pagination">
      <span class="page-info" id="pg-info">0 records</span>
      <div class="erp-list-pagination-controls">
        <button disabled>Previous</button>
        <button disabled>Next</button>
      </div>
    </div>

  </div>

  <script type="module" src="fiscal-years-list.js"></script>
</body>
</html>
