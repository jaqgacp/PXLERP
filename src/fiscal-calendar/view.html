<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>View Fiscal Period</title>
</head>
<body>

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <a href="#/setup">Setup</a> &rsaquo; 
    <a href="#/setup/fiscal-calendar">Fiscal Calendar</a> &rsaquo; View Fiscal Period
  </div>

  <!-- Page Header -->
  <div class="page-header">
    <h1>View Fiscal Period</h1>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn btn-primary" id="btn-edit">Edit</button>
    <button class="btn" onclick="window.location.hash = '#/setup/fiscal-calendar'">Back</button>
  </div>

  <!-- Form Sections -->
  <div class="form-container" style="padding: 20px; background: #fff; border: 1px solid #d4e4f0; margin-top: 10px;">
    <form id="fp-view-form">
      
      <div id="form-error" style="color: red; margin-bottom: 15px; display: none;"></div>

      <fieldset style="border: 1px solid #ccc; padding: 15px; margin-bottom: 15px;">
        <legend>General Information</legend>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
          <div>
            <label>Fiscal Year</label><br>
            <input type="text" id="fiscal_year_code" readonly style="width: 100%; padding: 5px; background: #f5f5f5;">
          </div>
          <div>
            <label>Period Number</label><br>
            <input type="text" id="period_number" readonly style="width: 100%; padding: 5px; background: #f5f5f5;">
          </div>
          <div>
            <label>Period Name</label><br>
            <input type="text" id="period_name" readonly style="width: 100%; padding: 5px; background: #f5f5f5;">
          </div>
          <div>
            <label>Quarter</label><br>
            <input type="text" id="quarter" readonly style="width: 100%; padding: 5px; background: #f5f5f5;">
          </div>
          <div>
            <label>Date From</label><br>
            <input type="date" id="date_from" readonly style="width: 100%; padding: 5px; background: #f5f5f5;">
          </div>
          <div>
            <label>Date To</label><br>
            <input type="date" id="date_to" readonly style="width: 100%; padding: 5px; background: #f5f5f5;">
          </div>
          <div>
            <label>Status</label><br>
            <input type="text" id="status" readonly style="width: 100%; padding: 5px; background: #f5f5f5;">
          </div>
        </div>
      </fieldset>

    </form>
  </div>

  <script type="module" src="fiscal-calendar-view.js"></script>
</body>
</html>
