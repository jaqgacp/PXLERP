<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Fiscal Period</title>
</head>
<body>

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <a href="#/setup">Setup</a> &rsaquo; 
    <a href="#/setup/fiscal-calendar">Fiscal Calendar</a> &rsaquo; Edit Fiscal Period
  </div>

  <!-- Page Header -->
  <div class="page-header">
    <h1>Edit Fiscal Period</h1>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn btn-primary" id="btn-save">Save Changes</button>
    <button class="btn" onclick="window.location.hash = '#/setup/fiscal-calendar'">Cancel</button>
  </div>

  <!-- Form Sections -->
  <div class="form-container" style="padding: 20px; background: #fff; border: 1px solid #d4e4f0; margin-top: 10px;">
    <form id="fp-edit-form" onsubmit="return false;">
      
      <div id="form-error" style="color: red; margin-bottom: 15px; display: none;"></div>

      <fieldset style="border: 1px solid #ccc; padding: 15px; margin-bottom: 15px;">
        <legend>General Information</legend>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
          <div>
            <label>Fiscal Year <span style="color:red">*</span></label><br>
            <select id="fiscal_year_id" required style="width: 100%; padding: 5px;">
              <option value="">Loading...</option>
            </select>
          </div>
          <div>
            <label>Period Number <span style="color:red">*</span></label><br>
            <input type="number" id="period_number" min="1" max="12" required style="width: 100%; padding: 5px;">
          </div>
          <div>
            <label>Period Name <span style="color:red">*</span></label><br>
            <input type="text" id="period_name" required style="width: 100%; padding: 5px;" placeholder="e.g. Jan 2026">
          </div>
          <div>
            <label>Quarter <span style="color:red">*</span></label><br>
            <input type="number" id="quarter" min="1" max="4" required style="width: 100%; padding: 5px;" readonly>
          </div>
          <div>
            <label>Date From <span style="color:red">*</span></label><br>
            <input type="date" id="date_from" required style="width: 100%; padding: 5px;">
          </div>
          <div>
            <label>Date To <span style="color:red">*</span></label><br>
            <input type="date" id="date_to" required style="width: 100%; padding: 5px;">
          </div>
          <div>
            <label>Status <span style="color:red">*</span></label><br>
            <select id="status" required style="width: 100%; padding: 5px;">
              <option value="open">Open</option>
              <option value="closed">Closed</option>
              <option value="locked">Locked</option>
            </select>
          </div>
        </div>
      </fieldset>
    </form>
  </div>

  <script type="module" src="fiscal-calendar-edit.js"></script>
</body>
</html>
