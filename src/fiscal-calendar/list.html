<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fiscal Calendar - List</title>
</head>
<body>

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <a href="#/setup">Setup</a> &rsaquo; Fiscal Calendar
  </div>

  <!-- Page Header -->
  <div class="page-header">
    <h1>Fiscal Calendar</h1>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn btn-primary" onclick="window.location.hash = '#/setup/fiscal-calendar/new'">New</button>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="filter-group">
      <label for="fiscal-year-filter">Fiscal Year:</label>
      <select id="fiscal-year-filter">
        <option value="">-- All --</option>
      </select>
    </div>
  </div>

  <!-- Data Grid -->
  <div class="data-grid-container">
    <table class="data-grid">
      <thead>
        <tr>
          <th>Year</th>
          <th>Period</th>
          <th>Period Name</th>
          <th>From Date</th>
          <th>To Date</th>
          <th>Quarter</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="fiscal-calendar-grid-body">
        <tr>
          <td colspan="8" class="text-center text-muted">Loading...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Status Footer -->
  <div class="status-footer">
    <span class="status-text">Fiscal Calendar List Loaded</span>
  </div>

  <script type="module" src="fiscal-calendar-list.js"></script>
</body>
</html>
