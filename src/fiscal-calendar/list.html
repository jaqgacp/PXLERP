<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fiscal Calendar - List</title>
</head>
<body>

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <a href="#/setup">Setup</a> &rsaquo; Fiscal Calendar
  </div>

  <!-- Page Header -->
  <div class="page-header">
    <h1>Fiscal Calendar</h1>
  </div>

  <!-- ERP List Container -->
  <div class="erp-list-container">
    
    <!-- ERP List Toolbar -->
    <div class="erp-list-toolbar">
      <div class="erp-list-search" style="display: flex; gap: 1rem; align-items: center;">
        <input type="text" id="fiscal-calendar-search" class="erp-search-input" placeholder="Search periods...">
        <label for="fiscal-year-filter" style="font-size: 0.875rem; font-weight: 500;">Fiscal Year:</label>
        <select id="fiscal-year-filter" style="padding: 0.4rem 0.5rem; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 0.875rem;">
          <option value="">-- All --</option>
        </select>
      </div>
      <div class="erp-list-toolbar-actions">
        <button class="btn-primary" onclick="window.location.hash = '#/setup/fiscal-calendar/new'">+ New Period</button>
      </div>
    </div>

    <!-- ERP List Table -->
    <div class="erp-list-table-wrapper">
      <table class="erp-list-table">
        <thead>
          <tr>
            <th>Year</th>
            <th>Period</th>
            <th>Period Name</th>
            <th>From Date</th>
            <th>To Date</th>
            <th>Quarter</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="fiscal-calendar-grid-body">
          <tr>
            <td colspan="8" class="erp-list-state-cell">
              <span class="erp-list-state-icon">⏳</span>
              <div>Loading periods...</div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- ERP List Pagination -->
    <div class="erp-list-pagination">
      <span class="page-info" id="pg-info">0 records</span>
      <div class="erp-list-pagination-controls">
        <button disabled>Previous</button>
        <button disabled>Next</button>
      </div>
    </div>

  </div>

  <script type="module" src="fiscal-calendar-list.js"></script>
</body>
</html>
